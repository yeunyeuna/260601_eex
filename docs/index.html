<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>포켓몬 도감</title>

    <!-- ✅ 파비콘 (투명 배경 SVG) -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />

    <!-- ✅ SNS / 카카오톡 / 슬랙 미리보기 (Open Graph) -->
    <meta property="og:title" content="포켓몬 도감 검색" />
    <meta property="og:description" content="포켓몬 이름을 검색하면 도감 정보, 타입, 울음소리까지 바로 확인할 수 있어요!" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- ✅ 트위터 카드 미리보기 -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="포켓몬 도감 검색" />
    <meta name="twitter:description" content="포켓몬 이름을 검색하면 도감 정보, 타입, 울음소리까지 바로 확인할 수 있어요!" />
    <meta name="twitter:image" content="og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-dots"></div>

    <div class="container">
      <header class="site-header">
        <div class="pokeball-icon">
          <div class="pb-top"></div>
          <div class="pb-band"></div>
          <div class="pb-bottom"></div>
          <div class="pb-center"></div>
        </div>
        <h1>포켓몬 도감</h1>
        <p class="subtitle">이름을 입력해서 포켓몬을 검색하세요</p>
      </header>

      <div class="search-card">
        <div class="search-group">
          <input
            type="text"
            id="search-input"
            placeholder="예: pikachu, ditto, charizard…"
            autocomplete="off"
            spellcheck="false"
          />
          <button id="search-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
        </div>
        <div class="quick-tags">
          <span class="tag" data-name="pikachu">피카츄</span>
          <span class="tag" data-name="charizard">리자몽</span>
          <span class="tag" data-name="mewtwo">뮤츠</span>
          <span class="tag" data-name="eevee">이브이</span>
          <span class="tag" data-name="snorlax">잠만보</span>
          <span class="tag" data-name="gengar">팬텀</span>
        </div>
      </div>

      <div id="result-container"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
